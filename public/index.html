<!DOCTYPE html>
<html lang="en" data-theme="nebula">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>

  <!-- Apply saved theme before render to avoid flash -->
  <script>
    const t = localStorage.getItem('theme');
    if (t) document.documentElement.dataset.theme = t;
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- xterm.js from CDN — the terminal emulator library -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit/lib/xterm-addon-fit.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="overlay"></div>

  <div id="topbar">
    <button id="hamburger">☰</button>
  </div>

  <div id="sidebar">
    <h2>Sessions</h2>

    <div id="new-session-form">
      <!-- Default: [dropdown][+] split button -->
      <div id="dir-choice">
        <select id="dir-select"></select>
        <button id="new-btn" title="New project">+</button>
      </div>

      <!-- New project form (shown when + is clicked) -->
      <div id="new-dir-panel" style="display:none">
        <input type="text" id="new-dir-input" placeholder="New project name" />
      </div>

      <button id="create-session-btn">Start Session</button>
      <button id="cancel-new-btn" style="display:none">Cancel</button>
    </div>

    <div id="session-list"></div>

    <!-- Gear button pinned to sidebar bottom -->
    <div id="sidebar-footer">
      <button id="config-btn" title="Settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="main">
    <div id="terminals"></div>
  </div>

  <!-- Config modal -->
  <div id="config-overlay" hidden>
    <div id="config-panel">
      <div id="config-header">
        <span>Settings</span>
        <button id="config-close">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M1 1l11 11M12 1L1 12"/>
          </svg>
        </button>
      </div>
      <div id="config-body">
        <div class="config-section">
          <div class="config-section-label">Theme</div>
          <div class="theme-grid">
            <button class="theme-btn" data-theme="nebula">
              <div class="theme-preview" style="background:#080810;box-shadow:inset 0 -5px 0 #7c6af7;"></div>
              <span>Nebula</span>
            </button>
            <button class="theme-btn" data-theme="dark">
              <div class="theme-preview" style="background:#0a0a0a;box-shadow:inset 0 -5px 0 #3b82f6;"></div>
              <span>Dark</span>
            </button>
            <button class="theme-btn" data-theme="light">
              <div class="theme-preview" style="background:#f0f0f5;box-shadow:inset 0 -5px 0 #6366f1;"></div>
              <span>Light</span>
            </button>
            <button class="theme-btn" data-theme="ember">
              <div class="theme-preview" style="background:#0a0807;box-shadow:inset 0 -5px 0 #d4532a;"></div>
              <span>Ember</span>
            </button>
            <button class="theme-btn" data-theme="claude">
              <div class="theme-preview" style="background:#0e0b09;box-shadow:inset 0 -5px 0 #d97559;"></div>
              <span>Claude</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
