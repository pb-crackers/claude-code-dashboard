<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #080810;
      color: #eeeef5;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 340px;
      background: #0f0f18;
      border: 1px solid #ffffff0f;
      border-radius: 14px;
      padding: 36px 28px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: #7c6af720;
      border: 1px solid #7c6af740;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-bottom: 4px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #eeeef5;
      letter-spacing: -0.01em;
    }

    p.sub {
      font-size: 12px;
      color: #55556a;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    input {
      width: 100%;
      background: #16161f;
      border: 1px solid #ffffff18;
      color: #eeeef5;
      padding: 9px 12px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      transition: border-color 140ms, background 140ms;
    }

    input:focus {
      outline: none;
      border-color: #7c6af7;
      background: #1e1e2a;
    }

    input::placeholder { color: #55556a; }

    button[type="submit"] {
      margin-top: 4px;
      width: 100%;
      background: #7c6af7;
      color: #fff;
      border: none;
      padding: 9px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 140ms;
    }

    button[type="submit"]:hover { background: #6a58e6; }

    .error {
      font-size: 12px;
      color: #f87171;
      text-align: center;
      background: #f871711a;
      border: 1px solid #f8717130;
      border-radius: 6px;
      padding: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo">⌘</div>
      <h1>Dashboard</h1>
      <p class="sub">Sign in to continue</p>
    </div>
    <form method="POST" action="/login">
      <input type="text" name="username" placeholder="Username" autofocus required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Sign in</button>
    </form>
    <script>
      if (new URLSearchParams(location.search).get('error')) {
        const err = document.createElement('p');
        err.className = 'error';
        err.textContent = 'Invalid username or password.';
        document.querySelector('.card').appendChild(err);
      }
    </script>
  </div>
</body>
</html>
